name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  policy-pr-head:
    name: policy-pr-head
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/check_pr_head.py

  skill-spec:
    name: skill-spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/check_skill_spec.py

  repo-policy:
    name: repo-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/check_repo_policy.py

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 -m pip install -r requirements.txt
      - run: python3 -m unittest discover -s tests -p "test_*.py"

  offline-smoke:
    name: offline-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 -m pip install -r requirements.txt
      - run: python3 -m m2c_pipeline fixtures/minimal-input.md --dry-run --translation-mode fallback

  skill-bootstrap-smoke:
    name: skill-bootstrap-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: |
          STAGE_DIR="$(mktemp -d "$RUNNER_TEMP/m2c-skill-stage-XXXXXX")"
          python3 scripts/ci/publish_skill_branch.py --stage-dir "$STAGE_DIR"
          test ! -e "$STAGE_DIR/venv"
          cd "$STAGE_DIR"
          ./scripts/bootstrap_env.sh
          ./venv/bin/python -m m2c_pipeline fixtures/minimal-input.md --dry-run --translation-mode fallback
        shell: bash

  package-dryrun:
    name: package-dryrun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/package_generic.py --output-dir dist

  published-artifact-isomorphism:
    name: published-artifact-isomorphism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/check_published_artifact_isomorphism.py

  required-job-contract:
    name: required-job-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/check_required_job_contract.py
