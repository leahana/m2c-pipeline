name: governance-audit

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-protection-sync:
    name: branch-protection-sync
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/governance_audit.py --mode sync-branch-protection
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_AUDIT_TOKEN }}

  branch-protection-audit:
    name: branch-protection-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/governance_audit.py --mode branch-protection
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_AUDIT_TOKEN }}

  tag-ruleset-audit:
    name: tag-ruleset-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/governance_audit.py --mode tag-ruleset
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_AUDIT_TOKEN }}

  skill-branch-ruleset-audit:
    name: skill-branch-ruleset-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: python3 scripts/ci/governance_audit.py --mode skill-branch-ruleset
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_AUDIT_TOKEN }}
