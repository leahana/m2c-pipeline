name: release-generic

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-guard:
    name: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - run: python3 scripts/ci/check_release_tag.py

  main-ancestry-guard:
    name: main-ancestry-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - run: |
          git fetch origin main --tags
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"
        shell: bash

  governance-precheck:
    name: governance-precheck
    runs-on: ubuntu-latest
    needs:
      - version-guard
      - main-ancestry-guard
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - run: python3 scripts/ci/governance_audit.py --mode all
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_AUDIT_TOKEN }}

  build-and-release:
    name: build-and-release
    runs-on: ubuntu-latest
    needs:
      - version-guard
      - main-ancestry-guard
      - governance-precheck
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - run: python3 scripts/ci/package_generic.py --output-dir dist
      - run: |
          VERSION="$(python3 -c 'from scripts.ci.common import load_version; print(load_version())')"
          ZIP_PATH="dist/m2c-pipeline-generic-v${VERSION}.zip"
          SHA_PATH="${ZIP_PATH}.sha256"
          gh release create "$GITHUB_REF_NAME" "$ZIP_PATH" "$SHA_PATH" \
            --title "$GITHUB_REF_NAME" \
            --notes "Generic Anthropic skill package for m2c-pipeline."
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
