name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout released tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_name }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Validate release tag contract
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: python3 scripts/ci/check_release_tag.py --tag "${{ steps.release.outputs.tag_name }}"

      - name: Build generic package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: python3 scripts/ci/package_generic.py --output-dir dist

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          VERSION="$(python3 -c 'from scripts.ci.common import load_version; print(load_version())')"
          ZIP_PATH="dist/m2c-pipeline-generic-v${VERSION}.zip"
          SHA_PATH="${ZIP_PATH}.sha256"
          gh release upload "${{ steps.release.outputs.tag_name }}" "$ZIP_PATH" "$SHA_PATH" --clobber
        shell: bash

      - name: Publish skill branch
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          SKILL_PUBLISH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: python3 scripts/ci/publish_skill_branch.py

      - name: Sync main back to dev
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dev
          git checkout dev
          git merge origin/main --no-ff -m "chore: sync main into dev after ${{ steps.release.outputs.tag_name }}"
          git push origin dev
